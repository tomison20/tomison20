# =============================================================================
#  Pac-Man Contribution Graph
#  Docs: https://github.com/abozanona/pacman-contribution-graph
#  Generates an animated SVG of your contribution graph as a Pac-Man game
#  Runs daily at midnight UTC + on manual trigger + on push to main
# =============================================================================

name: Generate Pac-Man Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🕹️ Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          theme: github-dark

      - name: 🚀 Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
