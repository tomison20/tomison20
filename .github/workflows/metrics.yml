# =============================================================================
#  GitHub Metrics — Auto-generated profile infographic
#  Docs: https://github.com/lowlighter/metrics
#  Runs daily at midnight UTC + on manual trigger
# =============================================================================

name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main", "master"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:

      # ── Full Profile Card ────────────────────────────────────────────────
      - name: 🦑 Generate Metrics
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          # ── General ──────────────────────────────────────────────────────
          user: tomison20
          template: classic
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          retries: 3
          retries_delay: 300
          plugins_errors_fatal: no
          # ── Base ─────────────────────────────────────────────────────────
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          # ── 3D Isometric Calendar ────────────────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # ── Languages ────────────────────────────────────────────────────
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell
          # ── Achievements ──────────────────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          # ── Mastered Topics / Technologies ────────────────────────────────
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          # ── Lines of Code ────────────────────────────────────────────────
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4
          # ── Apple Music — Playlist ──────────────────────────────────────
          plugin_music: yes
          plugin_music_provider: apple
          plugin_music_mode: playlist
          plugin_music_playlist: https://embed.music.apple.com/in/playlist/poolside-serotonin/pl.u-pMylgvbsWLVoxJ0
          plugin_music_limit: 4

